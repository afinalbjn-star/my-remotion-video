name: Render Abstract Cosmic Background

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Render Cosmic Background 4K
        run: npx remotion render AbstractCosmicBackground out/AbstractCosmicBackground.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Rendered Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rendered Abstract Cosmic Background 4K"
          branch: rendered-videos
          file_pattern: "out/AbstractCosmicBackground.mp4"
          create_branch: true
          push_options: "--force"

      - name: Upload Rendered Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: abstract-cosmic-background
          path: out/AbstractCosmicBackground.mp4