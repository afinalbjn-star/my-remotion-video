name: Render Quantum Flux Video

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Render Quantum Flux Video
        run: npx remotion render src/index.ts QuantumFlux-4K out/QuantumFlux-4K.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Rendered Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rendered Quantum Flux Video"
          branch: rendered-videos
          file_pattern: "out/QuantumFlux-4K.mp4"
          create_branch: true
          push_options: "--force"

      - name: Upload Rendered Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum-flux-video
          path: out/QuantumFlux-4K.mp4