name: Manual Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Pilih Komposisi yang ingin dirender'
        required: true
        default: 'CyberFlow-4K'
        type: choice
        options:
          - CyberFlow-4K
          - BloodStream-4K

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Render Remotion Video
        run: npx remotion render src/index.ts ${{ github.event.inputs.composition }} out/${{ github.event.inputs.composition }}.mp4

      - name: Commit and Push Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update rendered video ${{ github.event.inputs.composition }} [skip ci]"
          branch: main
          file_pattern: 'out/*.mp4'
          push_options: '--force'