name: Render CardioPulse 4K Video

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'Pilih resolusi video (Resolution)'
        required: true
        default: '4K'
        type: choice
        options:
          - '4K'
          - '1080p'
      crf:
        description: 'Kualitas video / Kompresi CRF (Fidelity: 16 = premium, 20 = standar)'
        required: true
        default: '16'
        type: string

jobs:
  render:
    name: Render and Deploy CardioPulse
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Render Video
        run: |
          RESOLUTION="${{ github.event.inputs.resolution || '4K' }}"
          CRF="${{ github.event.inputs.crf || '16' }}"
          
          mkdir -p out
          
          if [ "$RESOLUTION" = "1080p" ]; then
            echo "Rendering at 1080p Full HD..."
            npx remotion render CardioPulse out/CardioPulse-1080p.mp4 --width=1920 --height=1080 --crf=$CRF
            echo "VIDEO_FILE=CardioPulse-1080p.mp4" >> $GITHUB_ENV
          else
            echo "Rendering at 4K UHD..."
            npx remotion render CardioPulse out/CardioPulse-4K.mp4 --crf=$CRF
            echo "VIDEO_FILE=CardioPulse-4K.mp4" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Rendered Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rendered CardioPulse Video [GitHub Actions]"
          branch: rendered-videos
          file_pattern: "out/*.mp4"
          create_branch: true
          push_options: "--force"

      - name: Upload Rendered Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardiopulse-video
          path: out/${{ env.VIDEO_FILE }}
