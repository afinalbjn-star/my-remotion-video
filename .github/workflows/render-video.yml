name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Pilih ID Komposisi yang ingin di-render'
        required: true
        default: 'AnimatedBackground'
        type: choice
        options:
          - Main
          - AnimatedBackground
          - LuxuryBackground
          - TechnologyGrid

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: npx remotion render ${{ github.event.inputs.composition }} out/video.mp4

      - name: Upload Video ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.composition }}-video
          path: out/video.mp4