name: Render Cyber Intelligence Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Render Video
        uses: remotion-dev/github-action@v1
        with:
          entry-point: src/index.ts
          composition-id: CyberIntelligenceGrid
          output-location: out.mov
          codec: prores

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out.mov