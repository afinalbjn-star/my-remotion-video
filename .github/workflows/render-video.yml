name: Render Video Manual

on:
  workflow_dispatch:
    inputs:
      compositionId:
        description: 'ID Komposisi yang ingin dirender'
        required: true
        default: 'KembangApi'
      crf:
        description: 'Tingkat Kualitas (CRF: 0 = Lossless/Terbesar, 15 = Sangat Tinggi, 31 = Standar)'
        required: true
        default: '10'
        type: string

jobs:
  render:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 libasound2 libgl1-mesa-glx
          npm install --legacy-peer-deps

      - name: Render Video (MP4)
        run: |
          mkdir -p out
          CRF_VAL="${{ github.event.inputs.crf || '10' }}"
          xvfb-run npx remotion render src/index.tsx ${{ github.event.inputs.compositionId }} out/${{ github.event.inputs.compositionId }}.mp4 --codec=h264 --crf=$CRF_VAL

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.compositionId }}-mp4
          path: out/*.mp4