name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create output directory
        run: mkdir -p out

      - name: Render Video
        run: npx remotion render src/index.tsx MasterBackgroundShowcase out/video.mp4 --overwrite

      - name: Commit and Push video
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add out/video.mp4
          # Hanya commit jika ada perubahan untuk menghindari error
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-render master background video"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/video.mp4