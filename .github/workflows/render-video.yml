name: Render Remotion Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Render Hacker Coding
        run: npx remotion render HackerCodingBackground out/hacker_coding.mp4 --codec h264

      - name: Render Isometric Network
        run: npx remotion render IsometricNetwork out/isometric_network.mp4 --codec h264

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: out/*.mp4
          retention-days: 7