name: Render Video

on:
name: Render Video # Nama workflow yang akan muncul di tab Actions GitHub

on:
  push:
    branches:
      - main # Workflow ini akan berjalan setiap kali ada push ke branch 'main'
  workflow_dispatch: # Memungkinkan Anda untuk menjalankan workflow ini secara manual dari UI GitHub Actions

jobs:
  render: # Nama job
    runs-on: ubuntu-latest # Menentukan bahwa job ini akan berjalan di runner Ubuntu terbaru
    steps:
      - name: Checkout # Langkah pertama: Mengambil kode dari repositori Anda
        uses: actions/checkout@v4

      - name: Setup Node # Langkah kedua: Mengatur lingkungan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Menggunakan Node.js versi 20
          cache: 'npm' # Mengaktifkan caching untuk dependensi npm agar instalasi lebih cepat

      - name: Install Dependencies # Langkah ketiga: Menginstal semua dependensi proyek
        run: npm install # Menjalankan perintah npm install

      - name: Render Video # Langkah keempat: Merender video Remotion
        run: npx remotion render FuturisticBackground out/video.mp4 # Ini adalah perintah inti.
                                                                  # 'FuturisticBackground' adalah ID komposisi yang Anda daftarkan di Root.tsx.
                                                                  # 'out/video.mp4' adalah jalur dan nama file output video.

      - name: Upload Video # Langkah kelima: Mengunggah video hasil render sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: futuristic-video # Nama artifact yang akan muncul di GitHub Actions
          path: out/video.mp4 # Lokasi file video yang akan diunggah
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: npx remotion render FuturisticBackground out/video.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: futuristic-video
          path: out/video.mp4