name: Render Remotion Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        # Menjalankan render untuk komposisi HackerCodingBackground
        # Output akan disimpan di folder out/
        run: npx remotion render HackerCodingBackground out/video.mp4 --codec h264

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacker-coding-video
          path: out/video.mp4
          retention-days: 7