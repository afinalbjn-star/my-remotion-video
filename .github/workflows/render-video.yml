name: Render Holo Geometric Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video (High Quality Lossless)
        env:
          # Masukkan secret jika Anda menggunakannya di kode untuk ElevenLabs
          ELEVEN_LABS_API_KEY: ${{ secrets.ELEVEN_LABS_API_KEY }}
        run: |
          npx remotion render HoloGeometric-4K out.mp4 --codec h264 --crf 18 --preset slow --log-level verbose

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out.mp4