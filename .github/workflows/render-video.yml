name: Render Blood Stream Video

on:
  push:
    branches:
      - main # Trigger workflow setiap kali ada push ke branch main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ini penting untuk mengizinkan push kembali ke repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Sesuaikan dengan versi Node.js yang Anda gunakan

      - name: Install dependencies
        run: npm ci

      - name: Render Blood Stream Video
        run: npx remotion render src/index.ts BloodStream-4K out/BloodStream-4K.mp4
        env:
          # Pastikan Anda memiliki token GitHub dengan izin 'contents:write'
          # Remotion mungkin memerlukan token untuk beberapa fitur atau jika Anda menggunakan API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Rendered Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rendered Blood Stream Video"
          branch: rendered-videos # Anda bisa mengganti ini dengan branch lain, misalnya 'main' jika Anda ingin langsung ke main
          file_pattern: "out/BloodStream-4K.mp4" # Pastikan nama file sesuai dengan output render Anda
          create_branch: true # Buat branch jika belum ada
          push_options: "--force" # Gunakan --force jika Anda ingin menimpa file yang sudah ada

      - name: Upload Rendered Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blood-stream-video
          path: out/BloodStream-4K.mp4