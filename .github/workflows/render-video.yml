name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Pilih ID Komposisi yang ingin di-render'
        required: true
        default: 'AnimatedBackground'
        type: choice
        options:
          - Main
          - AnimatedBackground
          - LuxuryBackground
          - TechnologyGrid
      crf:
        description: 'Constant Rate Factor (0-51, default 16). Angka lebih rendah = kualitas lebih tinggi.'
        required: false
        default: '16'
      bitrate:
        description: 'Target Bitrate (contoh: 20M, 5000k). Kosongkan jika ingin menggunakan CRF.'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: |
          ARGS="--crf=${{ github.event.inputs.crf }}"
          if [ -n "${{ github.event.inputs.bitrate }}" ]; then
            ARGS="$ARGS --bitrate=${{ github.event.inputs.bitrate }}"
          fi
          npx remotion render ${{ github.event.inputs.composition }} out/video.mp4 $ARGS

      - name: Upload Video ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.composition }}-video
          path: out/video.mp4