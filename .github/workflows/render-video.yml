name: Render Video Manual

on:
  workflow_dispatch:
    inputs:
      compositionId:
        description: 'ID Komposisi yang ingin dirender'
        required: true
        default: 'PastelLoading'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libgbm1 libasound2 && npm install

      - name: Render Video (Transparent WebM)
        run: xvfb-run npx remotion render src/index.tsx ${{ github.event.inputs.compositionId }} out/video.webm --codec=vp9

      - uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/video.webm