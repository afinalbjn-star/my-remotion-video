name: Render CyberFlow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Render CyberFlow Video
        run: npx remotion render src/index.ts CyberFlow-4K out/cyberflow.mp4

      - name: Commit and Push Video
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update rendered cyberflow video [skip ci]"
          branch: main
          file_pattern: 'out/cyberflow.mp4'
          create_branch: true
          push_options: '--force'