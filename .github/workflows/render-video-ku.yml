name: render video-ku

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan render manual dari tab Actions

jobs:
  render:
    name: Render All Videos
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Render 4K memakan waktu lama, kita beri limit 2 jam

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies
        # Menginstall library Linux yang dibutuhkan browser untuk mendeteksi komposisi
        # dan xvfb untuk mendukung rendering WebGL/Three.js di server headless
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libasound2 xvfb

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Ensure Remotion Browser
        run: npx remotion browser ensure

      - name: Render All Compositions
        # Menggunakan xvfb-run agar Remotion bisa menjalankan browser secara headless 
        # namun tetap memiliki akses ke display virtual untuk memproses komposisi
        run: |
          xvfb-run npm run render
          xvfb-run npm run render-blood
          xvfb-run npm run render-cyber
          xvfb-run npm run render-snow

      - name: Upload Video Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-rendered-videos-4k
          # Mengambil semua file .mp4 yang ada di folder out/
          path: out/*.mp4
          retention-days: 7 # File akan otomatis dihapus setelah 7 hari untuk menghemat storage