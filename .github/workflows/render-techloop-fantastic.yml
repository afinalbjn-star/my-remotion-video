name: Render TechLoop Fantastic

on:
  push:
    branches:
      - main
    paths:
      - 'Root.tsx'
      - 'src/TechLoopBackground.tsx'
      - '.github/workflows/render-techloop-fantastic.yml'
  workflow_dispatch:

jobs:
  render-techloop-fantastic:
    name: Render TechLoopBackground-4K
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: techloop-fantastic-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Render fantastic loop
        run: npx remotion render src/index.ts TechLoopBackground-4K out/tech-loop-4k-fantastic.mp4 --crf 14

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tech-loop-4k-fantastic
          path: out/tech-loop-4k-fantastic.mp4
