name: Render OceanWaves Only

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Render OceanWaves
        run: npx remotion render src/index.tsx OceanWaves out/OceanWaves.mp4 --crf 12

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: ocean-waves-super-quality
          path: |
            out/OceanWaves.mp4