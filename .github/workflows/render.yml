name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan trigger manual dari GitHub UI
    inputs:
      composition_id:
        description: 'Pilih Komposisi yang Akan Dirender'
        required: true
        type: choice
        options:
          - KembangApi
          - RetroPopLoadingBackground
          - PolygonalBackground
          - NeonLinesBackground
          - PlexusTunnel
          - SolarSystem
          - GiantEye
          - RoyalChristmasBackground
          - FallingEyesBackground
          - KaleidoscopeFractal
          - BlueLinesKaleidoscope
          - HackerCodingBackground
          - IsometricNetwork
      output_filename:
        description: 'Nama File Output (misal: my_video.mp4)'
        required: true
        default: 'output.mp4'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Render Composition
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npx remotion render "${{ github.event.inputs.composition_id }}" "out/${{ github.event.inputs.output_filename }}" --codec h264
          else
            # Default render saat melakukan push
            mkdir -p out
            npx remotion render IsometricNetwork out/isometric_network.mp4 --codec h264
            npx remotion render HackerCodingBackground out/hacker_coding.mp4 --codec h264
          fi

      - name: Upload Videos
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.event.inputs.composition_id || 'push-results' }}
          path: out/*.mp4
          retention-days: 5