name: Render Remotion Video

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      compositionId:
        type: choice
        description: 'Pilih ID Komposisi yang ingin dirender'
        required: true
        options:
          - DataMesh
          - WinterSky
          - RiverFlow
          - RainbowLake
          - SineWaveSilk
          - TechBackground
          - TechBackgroundComplex
          - TechNexus
          - MyVideo
          - DarkWaves
          - LakeSurface
          - BioluminescentDeep
          - CinematicWave
          - InkBillow
          - SilkWave
          - LiquidMetal
          - AuroraBorealis
          - CosmicNebula
          - CrystalRain
          - PlasmaWave
          - DeepOcean
          - StarField
          - MysticForest
          - VolcanicGlass
          - NebulaVortex
          - QuantumField
          - FractalDreams
          - HyperDimensional
          - ChromaticFluid
      crf:
        description: 'Kualitas Video / CRF (0-51, makin rendah makin tajam, default: 16)'
        required: false
        default: '16'
      bitrate:
        description: 'Bitrate (opsional, contoh: 20M. Jika diisi, CRF akan diabaikan oleh FFmpeg)'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Render Video
        run: |
          COMP_ID="${{ github.event.inputs.compositionId || 'DataMesh' }}"
          CRF="${{ github.event.inputs.crf || '16' }}"
          BITRATE="${{ github.event.inputs.bitrate || '' }}"
          EXTRA_ARGS="--crf=$CRF"
          if [ -n "$BITRATE" ]; then EXTRA_ARGS="--bitrate=$BITRATE"; fi
          echo "COMP_ID=$COMP_ID" >> $GITHUB_ENV
          npx remotion render src/index.tsx "$COMP_ID" "out/$COMP_ID.mp4" $EXTRA_ARGS --timeout=120000

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.COMP_ID }}
          path: out/${{ env.COMP_ID }}.mp4
