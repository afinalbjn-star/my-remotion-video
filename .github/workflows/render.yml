name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    name: Render Remotion Video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        uses: remotion-dev/github-action@v2
        with:
          composition-id: QuantumCandlestickFlow
          out-name: out/quantum-candlestick-4k.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: render-output
          path: out/quantum-candlestick-4k.mp4