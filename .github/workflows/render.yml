name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan trigger manual dari GitHub UI
    inputs:
      composition_id:
        description: 'Pilih Komposisi yang Akan Dirender'
        required: true
        default: 'NeonTunnel'
        type: choice
        options:
          - NeonTunnel
          - LiquidWaves
          - NeuralGrid
          - FlowFields
          - Main
      output_filename:
        description: 'Nama File Output (kosongkan untuk otomatis menggunakan nama komposisi)'
        required: false
        default: ''
      crf:
        description: 'Nilai CRF (Semakin rendah, kualitas & ukuran file semakin besar. Coba 10-15)'
        required: true
        default: '15'
        type: string
      bitrate:
        description: 'Target Bitrate (Contoh: 100M)'
        required: true
        default: '100M'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Render Composition
        run: |
          mkdir -p out
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            COMP_ID="${{ github.event.inputs.composition_id }}"
            OUT_NAME="${{ github.event.inputs.output_filename }}"
            CRF_VAL="${{ github.event.inputs.crf }}"
            BITRATE_VAL="${{ github.event.inputs.bitrate }}"
            # Jika output_filename kosong, gunakan ID komposisi + .mp4
            if [ -z "$OUT_NAME" ]; then
              OUT_NAME="${COMP_ID}.mp4"
            fi
            npx remotion render src/index.tsx "$COMP_ID" "out/$OUT_NAME" --codec h264 --bitrate "$BITRATE_VAL" --crf "$CRF_VAL" --gl=angle
          else
            npx remotion render src/index.tsx LiquidWaves out/LiquidWaves.mp4 --codec h264 --bitrate 100M --crf 15 --gl=angle
          fi

      - name: Upload Videos
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.event.inputs.composition_id || 'push-results' }}
          path: out/*.mp4
          retention-days: 5