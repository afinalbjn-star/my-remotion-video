name: Render Remotion Video

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        uses: remotion-dev/render-video@v1
        with:
          # ID komposisi yang ingin kamu render (sesuai di Root.tsx)
          composition-id: BusinessStats
          entry-point: src/index.ts
          output-location: out/business-growth.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/business-growth.mp4