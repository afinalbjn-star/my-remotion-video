name: Render Videos

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan trigger manual dari GitHub UI
    inputs:
      composition_id:
        description: 'Pilih Komposisi yang Akan Dirender'
        required: true
        type: choice
        options:
          - KembangApi
          - RetroPopLoadingBackground
          - PolygonalBackground
          - NeonLinesBackground
          - PlexusTunnel
          - SolarSystem
          - GiantEye
          - RoyalChristmasBackground
          - FallingEyesBackground
          - KaleidoscopeFractal
          - BlueLinesKaleidoscope
          - HackerCodingBackground
          - IsometricNetwork
      output_filename:
        description: 'Nama File Output (misal: my_video.mp4)'
        required: true
        default: 'output.mp4'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Render Isometric Network
        run: npx remotion render IsometricNetwork out/isometric_network.mp4

      - name: Render Hacker Coding
        run: npx remotion render HackerCodingBackground out/hacker_coding.mp4

      - name: Upload Videos
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: out/*.mp4
          retention-days: 5