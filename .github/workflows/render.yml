name: Render Royal Christmas Video

on:
  push:
    branches:
      - main # Pastikan ini sesuai dengan nama branch utama Anda

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render Video
        uses: remotion-project/github-action@v1
        with:
          composition-id: RoyalChristmasBackground
          output-location: out/royal-christmas.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: royal-christmas-video
          path: out/royal-christmas.mp4