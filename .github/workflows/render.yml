name: Render Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install FFmpeg & Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Render All Videos
        run: npm run render-all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: out/*.mp4
          retention-days: 5