name: Render Remotion Video

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      compositionId:
        type: choice
        description: 'Pilih ID Komposisi yang ingin dirender'
        required: true
        options:
          - GeometricallyPreciseHoneycomb
          - Main
          - TechnologyGrid
          - LuxuryBackground
          - AnimatedBackground
          - TechBackground
          - AdvancedTechBackground
          - FuturisticBackground
          - CorporateAbstractLoop
          - CyberGridTunnel
          - GradientTechWaves
          - ComplexVoronoi
          - ChronoCosmicLattice
          - SilkFlowScene
          - KineticMoireMonolith
          - SeamlessLoopBackground
          - CosmosLoop
          - CelestialVortex
          - IsometricConveyor
          - CleanMinimalistIsometricGrid
          - LiquidGradientMeshLoop
          - CosmicRibbonWaveLoop
          - QuantumCyberSphereMatrix
          - LiquidGradientWaves
          - MinimalistBokehLoop
          - AuroraEtherealSilkV3
          - MinimalistSearchBarUI
          - AbstractCorporateNetwork
      crf:
        description: 'Kualitas Video / CRF (0-51, makin rendah makin tajam, default: 16)'
        required: false
        default: '16'
      bitrate:
        description: 'Bitrate (opsional, contoh: 20M. Jika diisi, CRF akan diabaikan oleh FFmpeg)'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Render Video
        run: |
          COMP_ID="${{ github.event.inputs.compositionId || 'GeometricallyPreciseHoneycomb' }}"
          CRF="${{ github.event.inputs.crf || '16' }}"
          BITRATE="${{ github.event.inputs.bitrate || '' }}"
          EXTRA_ARGS="--crf=$CRF"
          if [ -n "$BITRATE" ]; then EXTRA_ARGS="--bitrate=$BITRATE"; fi
          npx remotion render "$COMP_ID" out/video.mp4 $EXTRA_ARGS

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/video.mp4