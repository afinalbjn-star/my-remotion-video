name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    timeout-minutes: 60
    name: Render Remotion Video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Render Video
        run: npx remotion render src/index.ts SimpleVideo out/simple-video.mp4 --crf 18

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: simple-video
          path: out/simple-video.mp4
