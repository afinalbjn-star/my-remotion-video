name: Render Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    name: Render video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Render video
        run: npx remotion render GiantEye out/video.mp4 --codec=h264

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: giant-eye-4k-video
          path: out/video.mp4