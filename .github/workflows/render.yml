name: Render Video

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  render:
    name: Render video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 libasound2 libgl1-mesa-glx
          npm install --legacy-peer-deps

      - name: Render GiantEye Video
        run: xvfb-run npx remotion render GiantEye out/GiantEye_4K.mp4 --codec=h264

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: giant-eye-output
          path: out/GiantEye_4K.mp4